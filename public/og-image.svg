<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Faith Shield Care — Guided by Faith, Driven by Care">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#F2F3F5"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Brand rules -->
    <rect x="0" y="0" width="1200" height="8" fill="#C9922A"/>
    <rect x="0" y="624" width="1200" height="6" fill="#1B2D6B"/>

    <!-- Logo only, centered (full lockup: emblem + wordmark + tagline) -->
    <image href="og-logo.png" x="340" y="55" width="520" height="520" preserveAspectRatio="xMidYMid meet"/>
</svg>
