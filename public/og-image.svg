<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Faith Shield Care — Guided by Faith, Driven by Care">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#F2F3F5"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Brand rules -->
    <rect x="0" y="0" width="1200" height="8" fill="#C9922A"/>
    <rect x="0" y="624" width="1200" height="6" fill="#1B2D6B"/>

    <!-- Real logo (centered, full lockup: emblem + wordmark + tagline) -->
    <image href="og-logo.png" x="420" y="48" width="360" height="360" preserveAspectRatio="xMidYMid meet"/>

    <!-- Gold divider -->
    <rect x="540" y="430" width="120" height="3" rx="1.5" fill="#C9922A"/>

    <!-- Kicker -->
    <text x="600" y="476" text-anchor="middle" font-family="'DejaVu Sans', 'Segoe UI', Arial, sans-serif"
          font-size="22" letter-spacing="5" fill="#C9922A" font-weight="700">
        MEMBERSHIP · REFERRAL · CARE
    </text>

    <!-- Supporting copy -->
    <text x="600" y="524" text-anchor="middle" font-family="'DejaVu Sans', 'Segoe UI', Arial, sans-serif"
          font-size="26" fill="#6B6862">
        Affordable financial assistance, livelihood opportunities,
    </text>
    <text x="600" y="560" text-anchor="middle" font-family="'DejaVu Sans', 'Segoe UI', Arial, sans-serif"
          font-size="26" fill="#6B6862">
        and compassionate community care.
    </text>

    <!-- Footer URL -->
    <text x="600" y="602" text-anchor="middle" font-family="'DejaVu Sans', 'Segoe UI', Arial, sans-serif"
          font-size="20" fill="#1B2D6B" font-weight="600">
        faithshieldcare.web.app<tspan fill="#6B6862" font-weight="400"> · Philippines</tspan>
    </text>
</svg>
