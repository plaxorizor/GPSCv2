<!doctype html>
<html lang="en" prefix="og: https://ogp.me/ns#">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>FaithShield Care</title>
        <meta
            name="description"
            content="FaithShield Care is a community-based membership program providing affordable financial assistance, livelihood opportunities, and compassionate care — guided by faith and driven by compassion."
        />
        <meta name="theme-color" content="#14365C" />
        <link rel="canonical" href="https://faithshieldcare.web.app/" />

        <!-- Open Graph protocol (Facebook, LinkedIn, Messenger, etc.) -->
        <!-- The 4 required properties per ogp.me: og:title, og:type, og:image, og:url -->
        <!-- NOTE: update the absolute domain below once the production domain is final. -->
        <meta property="og:title" content="FaithShield Care" />
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://faithshieldcare.web.app/" />
        <meta property="og:image" content="https://faithshieldcare.web.app/og-image.png" />
        <meta property="og:image:secure_url" content="https://faithshieldcare.web.app/og-image.png" />
        <meta property="og:image:type" content="image/png" />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:alt" content="Guided by Faith, Driven by Care" />
        <meta property="og:site_name" content="FaithShield Care" />
        <meta property="og:locale" content="en_PH" />
        <meta property="article:publisher" content="https://www.facebook.com/faithshieldcare" />
        <meta
            property="og:description"
            content="A community-based membership program providing affordable financial assistance, livelihood opportunities, and compassionate care."
        />

        <!-- Twitter / X -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="FaithShield Care" />
        <meta
            name="twitter:description"
            content="A community-based membership program providing affordable financial assistance, livelihood opportunities, and compassionate care."
        />
        <meta name="twitter:image" content="https://faithshieldcare.web.app/og-image.png" />
        <meta name="twitter:image:alt" content="Guided by Faith, Driven by Care" />

        <!-- Structured data for Google Search (rich results) -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Organization",
                "name": "FaithShield Care",
                "url": "https://faithshieldcare.web.app/",
                "logo": "https://faithshieldcare.web.app/og-image.png",
                "image": "https://faithshieldcare.web.app/og-image.png",
                "slogan": "Guided by Faith, Driven by Care",
                "description": "A community-based membership program providing affordable financial assistance, livelihood opportunities, and compassionate care.",
                "areaServed": "PH",
                "sameAs": ["https://www.facebook.com/faithshieldcare"]
            }
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
